<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Verify हो रहा है...</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a2540;
    font-family: 'IBM Plex Mono', monospace;
    color: #eef3f8;
    padding: 20px;
    text-align: center;
  }
  .box { max-width: 360px; }
  h1 { font-family: 'Space Grotesk', sans-serif; font-size: 19px; margin-bottom: 10px; }
  p { font-size: 13px; color: #93a9c4; }
  .spinner {
    width: 34px; height: 34px;
    border: 3px solid #2e5c8a;
    border-top-color: #f2a541;
    border-radius: 50%;
    margin: 0 auto 20px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #ff8a65; }
  a.retry { color: #f2a541; text-decoration: underline; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <h1 id="title">Payment Verify हो रहा है</h1>
  <p id="msg">कृपया प्रतीक्षा करें, redirect हो रहे हैं...</p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get("order_id");
  const uid = params.get("uid");

  const title = document.getElementById("title");
  const msg = document.getElementById("msg");
  const spinner = document.getElementById("spinner");

  fetch(`/api/verify-payment?order_id=${orderId}&uid=${uid}`)
    .then((r) => r.json())
    .then((data) => {
      if (data.success) {
        title.textContent = "Payment हो गया!";
        msg.textContent = "Question banks khul rahe hain...";
        window.location.href = "access.html";
      } else {
        spinner.style.display = "none";
        title.textContent = "Payment verify नहीं हुआ";
        title.classList.add("error");
        msg.innerHTML = `Status: ${data.status || "unknown"}<br><br><a class="retry" href="payment.html">दोबारा try करें</a>`;
      }
    })
    .catch(() => {
      spinner.style.display = "none";
      title.textContent = "Error आया";
      title.classList.add("error");
      msg.innerHTML = `<a class="retry" href="payment.html">दोबारा try करें</a>`;
    });
</script>
</body>
</html>
