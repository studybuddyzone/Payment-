<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question Bank - Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-deep: #0a2540;
    --blue-panel: #0f3158;
    --blue-line: #2e5c8a;
    --amber: #f2a541;
    --paper: #eef3f8;
    --paper-dim: #93a9c4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background-color: var(--blue-deep);
    background-image:
      linear-gradient(rgba(46,92,138,0.35) 1px, transparent 1px),
      linear-gradient(90deg, rgba(46,92,138,0.35) 1px, transparent 1px);
    background-size: 88px 88px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--paper);
    padding: 24px 20px 40px;
  }
  .wrap { max-width: 440px; margin: 0 auto; }

  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  .tag {
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--amber);
    text-transform: uppercase;
  }
  .sbp-btn {
    padding: 9px 16px;
    border-radius: 3px;
    border: 1.5px solid var(--amber);
    background: transparent;
    color: var(--amber);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
  }
  .sbp-btn:hover { background: var(--amber); color: #17263a; }
  .sbp-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 6px;
  }
  .sub { font-size: 13px; color: var(--paper-dim); margin-bottom: 22px; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .card {
    background: var(--blue-panel);
    border: 1.5px solid var(--blue-line);
    border-radius: 4px;
    padding: 16px 14px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s ease, transform 0.15s ease;
    text-align: left;
  }
  .card:active { transform: scale(0.97); }

  .card.owned { border-color: var(--amber); }
  .card.owned::after {
    content: "✓ खुला है";
    position: absolute;
    top: 8px; right: 10px;
    color: var(--amber);
    font-size: 10px;
    letter-spacing: 0.04em;
  }
  .card.locked { opacity: 0.55; }
  .card.locked::after {
    content: "🔒";
    position: absolute;
    top: 10px; right: 12px;
    font-size: 13px;
  }

  .card.all-row { grid-column: 1 / -1; }

  .card .code {
    font-size: 11px;
    color: var(--amber);
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .card.locked .code { color: var(--paper-dim); }
  .card .name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 12px;
    min-height: 34px;
  }
  .card .price { font-size: 13px; color: var(--paper-dim); }

  .status {
    text-align: center;
    font-size: 13px;
    color: var(--paper-dim);
    margin: 40px 0;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="top-row">
    <div class="tag">Xevron-Tech // Dashboard</div>
    <button class="sbp-btn" id="sbpBtn">SBP</button>
  </div>
  <h1>Question Banks</h1>
  <div class="sub">Jo unlock hai usko tap karke seedha khulega</div>

  <div class="status" id="loadingMsg">Load हो रहा है...</div>
  <div class="grid" id="grid" style="display:none;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBhud5nJEKXa1cpACVILIp2FmE6RAuGNkY",
  authDomain: "payment-gateway-8ffe5.firebaseapp.com",
  databaseURL: "https://payment-gateway-8ffe5-default-rtdb.firebaseio.com",
  projectId: "payment-gateway-8ffe5",
  storageBucket: "payment-gateway-8ffe5.firebasestorage.app",
  messagingSenderId: "65617324140",
  appId: "1:65617324140:web:d1d504941d9f768fb25049",
  measurementId: "G-5S0Z4NNCW8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ---------------------------------------------------------------
// SEEDHA HARDCODED — name, price aur drive link teeno yahin hain.
// check-access.js jaisi koi alag file nahi hai; ownership seedha
// Firebase Realtime Database se client SDK se padhi ja rahi hai
// (payments/{uid}). Database rule laga do:
//   "payments": { "$uid": { ".read": "auth.uid === $uid", ".write": false } }
// (likhna sirf backend admin SDK se hoga: create-order.js / verify-payment.js / webhook.js)
//
// NOTE: chunki drive links ab client-side JS me hardcoded hain, technically
// koi bhi page source dekh kar sabhi links nikaal sakta hai, chahe wo
// subject unlock ho ya na ho. Agar ye acceptable nahi hai to link delivery
// ke liye ek chhota backend endpoint wapas add karna padega.
// ---------------------------------------------------------------
const SUBJECTS = {
  BCME:      { name: "Basic Civil & Mechanical Engineering", price: 59, driveLink: "PASTE_LINK_HERE" },
  BEEE:      { name: "Basic Electrical & Electronics Engineering", price: 59, driveLink: "PASTE_LINK_HERE" },
  CHEMISTRY: { name: "Engineering Chemistry", price: 59, driveLink: "PASTE_LINK_HERE" },
  CMS:       { name: "Communication Skills", price: 59, driveLink: "PASTE_LINK_HERE" },
  GRAPHICS:  { name: "Engineering Graphics", price: 59, driveLink: "PASTE_LINK_HERE" },
  M1:        { name: "Engineering Mathematics I", price: 59, driveLink: "PASTE_LINK_HERE" },
  M2:        { name: "Engineering Mathematics II", price: 59, driveLink: "https://drive.google.com/drive/folders/1ZIBJYUdwoBhSi4JQr3HOxAWnVpliUUt1" },
  MECHANIC:  { name: "Engineering Mechanics", price: 59, driveLink: "PASTE_LINK_HERE" },
  PANDPS:    { name: "Programming and Problem Solving", price: 59, driveLink: "PASTE_LINK_HERE" },
  PHYSICS:   { name: "Engineering Physics", price: 59, driveLink: "PASTE_LINK_HERE" }
};
const ALL_PRICE = 499;

const grid = document.getElementById("grid");
const loadingMsg = document.getElementById("loadingMsg");
const sbpBtn = document.getElementById("sbpBtn");

let ownedAll = false;
let ownedSubjects = [];

sbpBtn.addEventListener("click", () => {
  window.location.href = "payment.html";
});

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  try {
    const snap = await get(ref(db, `payments/${user.uid}`));
    const data = snap.exists() ? snap.val() : {};
    ownedAll = data.ownedAll === true;
    ownedSubjects = Array.isArray(data.ownedSubjects) ? data.ownedSubjects : [];

    if (!ownedAll && ownedSubjects.length === 0) {
      window.location.href = "payment.html";
      return;
    }

    renderDashboard();
  } catch (err) {
    loadingMsg.textContent = "Error aaya, page reload karein";
  }
});

function renderDashboard() {
  loadingMsg.style.display = "none";
  grid.style.display = "grid";

  if (ownedAll) {
    sbpBtn.disabled = true;
    sbpBtn.textContent = "SBP ✓";
  }

  Object.keys(SUBJECTS).forEach((key) => {
    const s = SUBJECTS[key];
    const isOwned = ownedAll || ownedSubjects.includes(key);

    const card = document.createElement("div");
    card.className = "card " + (isOwned ? "owned" : "locked");
    card.innerHTML = `
      <div class="code">${key}</div>
      <div class="name">${s.name}</div>
      <div class="price">${isOwned ? "Tap करें खोलने के लिए" : "₹" + s.price}</div>
    `;
    card.addEventListener("click", () => {
      if (!isOwned) { window.location.href = "payment.html"; return; }
      window.location.href = s.driveLink;
    });
    grid.appendChild(card);
  });

  const allCard = document.createElement("div");
  allCard.className = "card all-row " + (ownedAll ? "owned" : "locked");
  allCard.innerHTML = `
    <div class="code">ALL</div>
    <div class="name">सभी 10 Subjects (Bundle)</div>
    <div class="price">${ownedAll ? "Sab kuch khula hai" : "₹" + ALL_PRICE}</div>
  `;
  allCard.addEventListener("click", () => {
    if (!ownedAll) window.location.href = "payment.html";
  });
  grid.appendChild(allCard);
}
</script>
</body>
</html>
