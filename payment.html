<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question Bank - Select Subject</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
<style>
  :root {
    --blue-deep: #0a2540;
    --blue-panel: #0f3158;
    --blue-line: #2e5c8a;
    --amber: #f2a541;
    --paper: #eef3f8;
    --paper-dim: #93a9c4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background-color: var(--blue-deep);
    background-image:
      linear-gradient(rgba(46,92,138,0.35) 1px, transparent 1px),
      linear-gradient(90deg, rgba(46,92,138,0.35) 1px, transparent 1px);
    background-size: 88px 88px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--paper);
    padding: 24px 0 40px;
  }

  .wrap { max-width: 440px; margin: 0 auto; padding: 0 20px; }

  .tag {
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--amber);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 6px;
  }
  .sub {
    font-size: 13px;
    color: var(--paper-dim);
    margin-bottom: 22px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .card {
    background: var(--blue-panel);
    border: 1.5px solid var(--blue-line);
    border-radius: 4px;
    padding: 16px 14px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s ease, transform 0.15s ease;
    text-align: left;
  }
  .card:active { transform: scale(0.97); }
  .card.loading { opacity: 0.5; pointer-events: none; }

  .card .code {
    font-size: 11px;
    color: var(--amber);
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .card .name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 12px;
    min-height: 34px;
  }
  .card .price {
    font-size: 13px;
    font-weight: 600;
    color: var(--paper);
  }
  .card.all-row {
    grid-column: 1 / -1;
    background: repeating-linear-gradient(135deg, #15406e, #15406e 8px, #123a63 8px, #123a63 16px);
    border-color: var(--amber);
  }

  .status {
    text-align: center;
    font-size: 12.5px;
    color: var(--paper-dim);
    min-height: 18px;
    margin-top: 18px;
  }
  .status.error { color: #ff8a65; }
</style>
</head>
<body>

<div class="wrap">
  <div class="tag">Xevron-Tech // Question Bank</div>
  <h1>Subject चुनिए</h1>
  <div class="sub">Tap करते ही payment shuru ho jayega</div>

  <div class="grid" id="grid"></div>

  <div class="status" id="statusMsg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBhud5nJEKXa1cpACVILIp2FmE6RAuGNkY",
  authDomain: "payment-gateway-8ffe5.firebaseapp.com",
  databaseURL: "https://payment-gateway-8ffe5-default-rtdb.firebaseio.com",
  projectId: "payment-gateway-8ffe5",
  storageBucket: "payment-gateway-8ffe5.firebasestorage.app",
  messagingSenderId: "65617324140",
  appId: "1:65617324140:web:d1d504941d9f768fb25049",
  measurementId: "G-5S0Z4NNCW8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ---------------------------------------------------------------
// SEEDHA HARDCODED — koi Firebase database fetch nahi, koi
// check-access.js nahi. Card pe tap karte hi seedha create-order.js
// ko call karke payment gateway pe bhej denge. Agar ye subject
// (ya ALL) pehle se khareeda hua hai, to create-order.js khud
// "alreadyPaid" bata dega aur hum dashboard pe bhej denge.
// ---------------------------------------------------------------
const SUBJECTS = {
  BCME:      { name: "Basic Civil & Mechanical Engineering", price: 59 },
  BEEE:      { name: "Basic Electrical & Electronics Engineering", price: 59 },
  CHEMISTRY: { name: "Engineering Chemistry", price: 59 },
  CMS:       { name: "Communication Skills", price: 59 },
  GRAPHICS:  { name: "Engineering Graphics", price: 59 },
  M1:        { name: "Engineering Mathematics I", price: 59 },
  M2:        { name: "Engineering Mathematics II", price: 59 },
  MECHANIC:  { name: "Engineering Mechanics", price: 59 },
  PANDPS:    { name: "Programming and Problem Solving", price: 59 },
  PHYSICS:   { name: "Engineering Physics", price: 59 }
};
const ALL_PRICE = 499;

const grid = document.getElementById("grid");
const statusMsg = document.getElementById("statusMsg");

function setStatus(msg, type = "") {
  statusMsg.textContent = msg;
  statusMsg.className = "status" + (type ? " " + type : "");
}

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }
  currentUser = user;
  renderSubjects();
});

function renderSubjects() {
  Object.keys(SUBJECTS).forEach((key) => {
    const s = SUBJECTS[key];
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.key = key;
    card.innerHTML = `
      <div class="code">${key}</div>
      <div class="name">${s.name}</div>
      <div class="price">₹${s.price}</div>
    `;
    card.addEventListener("click", () => startPayment(card, key, s.price));
    grid.appendChild(card);
  });

  const allCard = document.createElement("div");
  allCard.className = "card all-row";
  allCard.innerHTML = `
    <div class="code">ALL</div>
    <div class="name">सभी 10 Subjects (Bundle)</div>
    <div class="price">₹${ALL_PRICE}</div>
  `;
  allCard.addEventListener("click", () => startPayment(allCard, "ALL", ALL_PRICE));
  grid.appendChild(allCard);
}

async function startPayment(cardEl, subjectKey, price) {
  if (!currentUser) return;
  document.querySelectorAll(".card").forEach((c) => c.classList.add("loading"));
  setStatus(`₹${price} ka order बन रहा है...`);

  try {
    const idToken = await currentUser.getIdToken();
    const res = await fetch("/api/create-order", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ idToken, subjectKey })
    });
    const data = await res.json();

    if (data.alreadyPaid) {
      setStatus("Ye pehle se khareeda hua hai, dashboard pe bhej rahe hain...", "success");
      window.location.href = "access.html";
      return;
    }

    if (!data.payment_session_id) {
      setStatus(data.error || "Order create nahi hua", "error");
      document.querySelectorAll(".card").forEach((c) => c.classList.remove("loading"));
      return;
    }

    const cashfree = Cashfree({ mode: "production" });
    cashfree.checkout({
      paymentSessionId: data.payment_session_id,
      redirectTarget: "_self"
    });
  } catch (err) {
    setStatus("Error: " + err.message, "error");
    document.querySelectorAll(".card").forEach((c) => c.classList.remove("loading"));
  }
}
</script>
</body>
</html>
